<!DOCTYPE html>
<!-- saved from url=(0032)http://195.122.224.152:8000/chat -->
<html lang="ru">
<link type="text/css" rel="stylesheet" id="dark-mode-custom-link">
<link type="text/css" rel="stylesheet" id="dark-mode-general-link">
<style lang="en" type="text/css" id="dark-mode-custom-style"></style>
<style lang="en" type="text/css" id="dark-mode-native-style"></style>

<head>
   <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <meta name="robots" content="noindex">
   <link rel="icon" href="http://195.122.224.152:8000/static/favicon.gif" type="image/gif">
   <link rel="apple-touch-icon" sizes="180x180" href="http://195.122.224.152:8000/static/apple-touch-icon.png">
   <link rel="icon" type="image/png" sizes="32x32" href="http://195.122.224.152:8000/static/favicon-32x32.png">
   <link rel="icon" type="image/png" sizes="16x16" href="http://195.122.224.152:8000/static/favicon-16x16.png">
   <link rel="manifest" href="http://195.122.224.152:8000/static/site.webmanifest">
   <title>Chat</title>
   <link rel="stylesheet" href="./all.css">
   <link id="theme" rel="stylesheet" href="static/chat_themes/classic.css">
   <!-- Элемент для воспроизведения звука -->
</head>

<body class="active">
   <audio id="notificationSound" src="static/ping.mp3" preload="auto"></audio>
   <div id="Main">
      <div>
         <div id="ClockBackground">
            <a id="Clock">time</a>
         </div>
         <h1 id="CH">Chat</h1>

      </div>
      <p>
         <input type="checkbox" name="switcher" id="switcher-input" class="switcher-input">
         <img src="/static/MaxwellIdle.gif" width="25">
      </p>

      <label class="switcher-label" for="switcher-input">
         <i class="fas fa-solid fa-moon"></i>
         <span class="switcher-toggler"></span>
         <i class="fas fa-solid fa-sun"></i>
      </label>

      <div id="messages">
         <div><span style="color: #2d8c3f; font-weight: bold;">Database</span>:I am loading right now!</div>
      </div>
      <div id="error-message"></div>

      <form id="messageForm" onsubmit="sendMessage(event)">
         <input id="name" placeholder="Name" required="" maxlength="40">
         <input type="text" id="message" placeholder="Message" required="" autocomplete="off" maxlength="1000">
         <button id="SendButton" type="submit">Send</button>
         <img src="/static/pa6v03g1glo91.gif" width="25">
      </form>

      <button id="notificationToggle">Disable notifications</button>
      <div id="drop_zone">Drop files here</div>
      <button id="returnButton" onclick="window.location.href='main.html'">
         Return to Main Page
      </button>
      <div id="media-overlay"
         style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:9999;">
         <div id="media-content" style="position:relative;"></div>
      </div>
   </div>

   <div class="overlay" onclick="toggleBottomMenu()"></div>

   <div class="bottom-menu" id="bottomMenu">
      <div class="menu-header" id="menu-header">Navigation</div><span id="localisation" onclick="ChangeLocale()">en</span>
      <div class="menu-content">
         <a id="menu-button-main" href="main.html" onclick="toggleBottomMenu()">🏠 Main</a>
         <a id="menu-button-about" href="About Page" onclick="toggleBottomMenu()">❔ About</a>
         <a id="menu-button-make_drop" href="make_drop" onclick="toggleBottomMenu()">📤 Make drop</a>
         <a id="menu-button-direct" href="direct" onclick="toggleBottomMenu()">📨 Direct</a>

      </div>
      <div id="BottomMenu">
         <button id="StartButton" class="menu-button" onclick="toggleBottomMenu()">
            <img id="StartImg" src="/static/start.png" alt="Menu">
            <a id="MenuText">Menu</a>
         </button>
         <div class="animated-dropdown">
            <button class="dropdown-trigger" id="ThemeButton">Theme</button>
            <div class="dropdown-menu">
               <div class="menu-item" onclick="ChangeTheme('classic')">Classic</div>
               <div class="menu-item" onclick="ChangeTheme('neon')">Neon</div>
               <div class="menu-item" onclick="ChangeTheme('minimalism')">Minimalism</div>
               <div class="menu-item"></div>
            </div>
         </div>
      </div>
   </div>
   <script src="static/socket.io.js"></script>
   <script src="static/chat.js"></script>

</body>

</html>
